# Render Blueprint for MiroFish Backend
# 使用方法：
# 1. 登入 render.com
# 2. New + > Blueprint
# 3. 選擇 superronclaw/MiroFish

# 注意：需要先手動創建 PostgreSQL 數據庫

services:
  - type: web
    name: mirofish-backend
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: FLASK_DEBUG
        value: "False"
      - key: FLASK_HOST
        value: "0.0.0.0"
      - key: FLASK_PORT
        value: "10000"
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://ai-gateway.happycapy.ai/api/v1/chat/completions
      - key: LLM_MODEL_NAME
        value: anthropic/claude-haiku-4.5
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      # 數據庫配置 - 稍後手動填寫
      - key: FOOTBALL_DB_HOST
        sync: false
      - key: FOOTBALL_DB_PORT
        value: "5432"
      - key: FOOTBALL_DB_NAME
        sync: false
      - key: FOOTBALL_DB_USER
        sync: false
      - key: FOOTBALL_DB_PASSWORD
        sync: false
